name: Test renesas install enviroment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env: 
      FSP_VERSION: "6.1.0" 
      E2STUDIO_VERSION: "2025-07" 
      RENESAS_INSTALL_DIR: "/root/renesas" 
      FSP_INSTALLER: "setup_fsp_v6_1_0_e2s_v2025-07.xz.run"
      RASC_INSTALLER: "setup_fsp_v6_1_0_rasc_v2025-07.xz.run"
      ARM_GNU_TOOLCHAIN_BIN: "/root/renesas/ra/e2studio_v2025-07_fsp_v6.1.0/toolchains/gcc_arm/arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi/bin"
      RASC_EXE_PATH: "/root/renesas/ra/sc_v2025-07_fsp_v6.1.0/eclipse/rasc"

    steps:
    - name: Checkout source
      uses: actions/checkout@v7

    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential ruby ruby-dev gdb clang-tidy curl ninja-build

    - name: Install Ceedling
      run: sudo gem install ceedling --no-document

    - name: Download RASC 6.1.0 installer
      shell: bash
      run: |
        set -euxo pipefail

        curl \
          --fail \
          --location \
          --show-error \
          --silent \
          --retry 3 \
          --output "${RASC_INSTALLER}" \
         "https://github.com/renesas/fsp/releases/download/v${FSP_VERSION}/${RASC_INSTALLER}"

        chmod +x "${RASC_INSTALLER}"
        ls -lh "${RASC_INSTALLER}"

    - name: Download FSP 6.1.0 installer
      shell: bash
      run: |
        set -euxo pipefail

        curl \
          --fail \
          --location \
          --show-error \
          --silent \
          --retry 3 \
          --output "${FSP_INSTALLER}" \
          "https://github.com/renesas/fsp/releases/download/v${FSP_VERSION}/${FSP_INSTALLER}"

        chmod +x "${FSP_INSTALLER}"
        ls -lh "${FSP_INSTALLER}"
   
    - name: Install RASC 6.1.0
      run: |
        sudo "./${RASC_INSTALLER}" --accept --nox11 -- --launcher.suppressErrors -nosplash -install.silent
    
    - name: Install FSP studio 6.1.0
      run: |
       sudo "./${FSP_INSTALLER}" --accept --nox11 -- --launcher.suppressErrors -nosplash -install.silent
     
    - name: Verify Renesas toolchain 
      shell: bash 
      run: | 
        set -euxo pipefail 
        sudo test -x "${ARM_GNU_TOOLCHAIN_BIN}/arm-none-eabi-gcc" 
        sudo test -x "${ARM_GNU_TOOLCHAIN_BIN}/arm-none-eabi-g++" 
        sudo test -x "${ARM_GNU_TOOLCHAIN_BIN}/arm-none-eabi-size" 
        sudo "${ARM_GNU_TOOLCHAIN_BIN}/arm-none-eabi-gcc" --version 
        sudo "${ARM_GNU_TOOLCHAIN_BIN}/arm-none-eabi-g++" --version 
        sudo "${ARM_GNU_TOOLCHAIN_BIN}/arm-none-eabi-size" --version
    
    - name: Verify development environment
      shell: bash
      run: |
        set -euxo pipefail

        cmake --version
        ninja --version
        clang-tidy --version
        ruby --version
        ceedling version

    - name: Create build directory
      run: sudo mkdir -p build

    - name: Configure
      run: |
        sudo cmake -S . -B build -G Ninja \
              -DARM_GNU_TOOLCHAIN_BIN="${ARM_GNU_TOOLCHAIN_BIN}" \
              -DRASC_EXE_PATH="${RASC_EXE_PATH}" \
              -DCMAKE_BUILD_TYPE=Debug -DPLATFORM=RA6T2

    - name: Static analysis with clang-tidy
      run: |
        echo "::group::Running clang-tidy"
        clang-tidy -p build $(find Core -name '*.c') -- || exit 1
        echo "::endgroup::"

    - name: Build
      run: |
        set +e
        cmake --build build --verbose
        status=$?

        echo "RASC logs:"
        find build -name rasc_cmd_log.txt -print -exec cat {} \;

        exit "${status}"



    - name: Compiler warnings
      run: |
        echo "::group::Warnings"
        sudo cmake --build build --parallel 2>&1 | tee build.log | grep warning || true
        echo "::endgroup::"

    - name: Unit tests with Ceedling
      working-directory: .
      run: |
        set -eo pipefail
        ceedling test:all | tee ceedling_output.log
        grep -q "FAIL" ceedling_output.log && exit 1 || exit 0