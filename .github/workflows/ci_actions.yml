name: Test renesas install enviroment

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    env: 
      FSP_VERSION: "6.1.0" 
      E2STUDIO_VERSION: "2025-07" 
      RENESAS_INSTALL_DIR: "/home/runner/renesas" 
      RASC_INSTALLER: "setup_fsp_v6_1_0_rasc_v2025-07.xz.run"
      RASC_EXE_PATH: "/home/runner/renesas/ra/sc_v2025-07_fsp_v6.1.0/eclipse/rasc"
      ARM_TOOLCHAIN_DIR: "/home/arm-toolchain/"

    steps:
    - name: Checkout source
      uses: actions/checkout@v5

    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential ruby ruby-dev gdb clang-tidy curl ninja-build srecord

    - name: Install Ceedling
      run: sudo gem install ceedling --no-document

    - name: Download RASC 6.1.0 installer
      shell: bash
      run: |
        set -euxo pipefail

        curl \
          --fail \
          --location \
          --show-error \
          --silent \
          --retry 3 \
          --output "${RASC_INSTALLER}" \
         "https://github.com/renesas/fsp/releases/download/v${FSP_VERSION}/${RASC_INSTALLER}"

        chmod +x "${RASC_INSTALLER}"
        ls -lh "${RASC_INSTALLER}"

    - name: Install RASC 6.1.0
      run: |
        "./${RASC_INSTALLER}" --accept --nox11 -- --launcher.suppressErrors -nosplash -install.silent
    

    - name: Download Arm GNU Toolchain 13.2.Rel1
      shell: bash
      run: |
        set -euo pipefail

        ARCHIVE="arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi.tar.xz"
        URL="https://developer.arm.com/-/media/Files/downloads/gnu/13.2.Rel1/binrel/${ARCHIVE}"

        mkdir -p "${ARM_TOOLCHAIN_DIR}"

        curl --fail --location --retry 3 \
          --output "/tmp/${ARCHIVE}" \
          "${URL}"

        tar -xJf "/tmp/${ARCHIVE}" \
          --directory "${ARM_TOOLCHAIN_DIR}" \
          --strip-components=1

        echo "${ARM_TOOLCHAIN_DIR}/bin" >> "${GITHUB_PATH}"

    # - name: Download FSP 6.1.0 installer
    #   shell: bash
    #   run: |
    #     set -euxo pipefail

    #     curl \
    #       --fail \
    #       --location \
    #       --show-error \
    #       --silent \
    #       --retry 3 \
    #       --output "${FSP_INSTALLER}" \
    #       "https://github.com/renesas/fsp/releases/download/v${FSP_VERSION}/${FSP_INSTALLER}"

    #     chmod +x "${FSP_INSTALLER}"
    #     ls -lh "${FSP_INSTALLER}"

    # - name: Install FSP studio 6.1.0
    #   run: |
    #    "./${FSP_INSTALLER}" --accept --nox11 -- --launcher.suppressErrors -nosplash -install.silent
     
    - name: Verify ARM toolchain 
      shell: bash 
      run: | 
       set -euxo pipefail

       whoami
       echo "HOME=${HOME}"

       "arm-none-eabi-gcc" --version
       "arm-none-eabi-g++" --version
       "arm-none-eabi-size" --version

    - name: Verify development environment
      shell: bash
      run: |
        set -euxo pipefail

        cmake --version
        ninja --version
        clang-tidy --version
        ruby --version
        ceedling version

    - name: Create build directory
      run: mkdir -p build

    - name: Configure
      run: |
        cmake -S . -B build -G Ninja \
              -DARM_GNU_TOOLCHAIN_BIN="" \
              -DRASC_EXE_PATH="${RASC_EXE_PATH}" \
              -DCMAKE_BUILD_TYPE=Debug -DPLATFORM=RA6T2 \
              -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake


    - name: Static analysis with clang-tidy
      run: |
        echo "::group::Running clang-tidy"
        clang-tidy -p build $(find Core -name '*.c') -- || exit 1
        echo "::endgroup::"

    - name: Build
      shell: bash
      run: |
        max_attempts=2

        for attempt in $(seq 1 "$max_attempts"); do
          echo "Build: intento $attempt de $max_attempts"

          if cmake --build build; then
            echo "Build completado correctamente"
            exit 0
          fi

          if [ "$attempt" -lt "$max_attempts" ]; then
            echo "El build ha fallado. Reintentando..."
            sleep 5
          fi
        done

        echo "El build falló tras $max_attempts intentos"
        exit 1

    - name: Compiler warnings
      run: |
        echo "::group::Warnings"
        cmake --build build --parallel 2>&1 | tee build.log | grep warning || true
        echo "::endgroup::"

    # - name: Unit tests with Ceedling
    #   working-directory: .
    #   run: |
    #     set -eo pipefail
    #     ceedling test:all | tee ceedling_output.log
    #     grep -q "FAIL" ceedling_output.log && exit 1 || exit 0


    - name: Determine release files
      id: firmware
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        VERSION_NUM="${VERSION//./}"

        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "hex=build/ra6t2_build/FW/Corrv${VERSION_NUM}.hex" >> "$GITHUB_OUTPUT"
        echo "bin=build/ra6t2_build/FW/Corrv${VERSION_NUM}.bin" >> "$GITHUB_OUTPUT"

    - name: Validate release files
      if: github.event_name == 'push' && github.ref_type == 'tag'
      run: |
        test -s "${{ steps.firmware.outputs.hex }}"
        test -s "${{ steps.firmware.outputs.bin }}"

    - name: Publish release
      if: github.event_name == 'push' && github.ref_type == 'tag'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${GITHUB_REF_NAME}" \
          "${{ steps.firmware.outputs.hex }}" \
          "${{ steps.firmware.outputs.bin }}" \
          --verify-tag \
          --generate-notes \
          --title "Firmware ${GITHUB_REF_NAME}"