:project:
  :use_test_preprocessor: :all
  :use_auxiliary_dependencies: true
  :build_root: build
  # :release_build: TRUE
  :test_file_prefix: test_
  :which_ceedling: gem
  :ceedling_version: 0.31.1
  :default_tasks:
    - test:all
  :use_backtrace: :gdb

:environment:

:extension:
  :executable: .out

:paths:
  :test:
    - +:Test/**
    - -:Test/support
  :source:
    - Core/App/**
  :include:
    - Core/App/**
  :support:
    - Test/support
  :libraries: []

:defines:
  # in order to add common defines:
  #  1) remove the trailing [] from the :common: section
  #  2) add entries to the :common: section (e.g. :test: has TEST defined)
  :common: &common_defines []
  :test:
    - *common_defines
    - TEST
  :test_preprocess:
    - *common_defines
    - TEST

:cmock:
  :mock_prefix: mock_
  :when_no_prototypes: :warn
  :enforce_strict_ordering: TRUE
  :plugins:
    - :ignore
    - :callback
  :treat_as:
    uint8:    HEX8
    uint16:   HEX16
    uint32:   UINT32
    int8:     INT8
    bool:     UINT8

